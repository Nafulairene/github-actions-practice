name: Test

on: [push, workflow_dispatch]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Testmo CLI
        run: npm install --global @testmo/testmo-cli

      - name: Run tests
        run: npm run mocha-junit

      - name: Submit results to Testmo
        if: always()
        env:
          TESTMO_URL: https://nafula.testmo.net
          TESTMO_TOKEN: ${{ secrets.TESTMO_TOKEN }}
        run: |
          testmo automation:run:submit \
            --instance "$TESTMO_URL" \
            --project-id 1 \
            --name "GitHub Actions practice run" \
            --source "mocha-tests" \
            --results results/mocha-test-results.xml
